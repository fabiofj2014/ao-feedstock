# CI — hard backstop for Trilho A. The local gates are a strong nudge; this is
# the gate that actually blocks the PR. Adapt commands to your package scripts.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  # The real wall for secrets. secrets.ts (in the agent loop) is only the first
  # line; this job blocks the PR if a secret reaches the repo.
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  gate:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci --ignore-scripts
          else
            npm install --ignore-scripts
          fi
      - name: Typecheck
        run: npm run --silent typecheck --if-present
      - name: Lint
        run: npm run --silent lint --if-present
      - name: Test
        run: npm run --silent test --if-present
      - name: Upload evidence ledger
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pi-gate-evidence
          path: evidence/ledger.jsonl
          if-no-files-found: ignore
