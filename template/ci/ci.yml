# CI — hard backstop for Trilho A. The local gates are a strong nudge; this is
# the gate that actually blocks the PR. Adapt commands to your package scripts.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  # The real wall for secrets. secrets.ts (in the agent loop) is only the first
  # line; this job blocks the PR if a secret reaches the repo.
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  gate:
    name: Quality gate (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect Node project
        id: detect
        run: echo "node=$([ -f package.json ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-node@v4
        if: steps.detect.outputs.node == 'true'
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install
        if: steps.detect.outputs.node == 'true'
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci --ignore-scripts
          else
            npm install --ignore-scripts
          fi
      - name: Typecheck
        if: steps.detect.outputs.node == 'true'
        run: npm run --silent typecheck --if-present
      - name: Lint
        if: steps.detect.outputs.node == 'true'
        run: npm run --silent lint --if-present
      - name: Test
        if: steps.detect.outputs.node == 'true'
        run: npm run --silent test --if-present
      - name: Upload evidence ledger
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pi-gate-evidence
          path: evidence/ledger.jsonl
          if-no-files-found: ignore

  gate-python:
    name: Quality gate (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect Python project
        id: detect
        run: echo "py=$([ -f pyproject.toml ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-python@v5
        if: steps.detect.outputs.py == 'true'
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
        if: steps.detect.outputs.py == 'true'
      - name: Install
        if: steps.detect.outputs.py == 'true'
        run: |
          if [ -f uv.lock ]; then
            uv sync --frozen
          else
            pip install -e ".[dev]" 2>/dev/null || pip install -e .
          fi
      - name: Gate
        if: steps.detect.outputs.py == 'true'
        run: bash gates/full-gate.sh
